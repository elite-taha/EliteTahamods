<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع Elite Taha</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        header {
            background-color: #161b22;
            padding: 50px 20px;
            border-bottom: 1px solid #30363d;
        }
        h1 { color: #58a6ff; margin: 0; font-size: 2.2rem; }
        p { font-size: 1.1rem; color: #8b949e; }
        .container {
            max-width: 90%;
            width: 500px;
            margin: 40px auto;
            background: #21262d;
            padding: 30px 20px;
            border-radius: 12px;
            border: 1px solid #30363d;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        .btn {
            display: inline-block;
            background-color: #238636;
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            margin-top: 20px;
            transition: 0.2s;
        }
        .btn:hover { background-color: #2ea043; }
    </style>
</head>
<body>

    <header>
        <h1>مرحباً بك في موقعي المباشر! 🎉</h1>
        <p>تم إنشاؤه بواسطة الذكاء الاصطناعي ومستضاف بالكامل على GitHub Pages</p>
    </header>

    <div class="container">
        <h2>من أنا؟</h2>
        <p>مرحباً، أنا طه. هذا هو موقعي الإلكتروني الأول على شبكة الإنترنت، قمت ببرمجته وإطلاقه بالكامل عبر الهاتف الذكي بدون استخدام جهاز كمبيوتر!</p>
        <a href="https://github.com/elite-taha" class="btn">تابعني على GitHub</a>
    </div>

</body>
</html>
